<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTFStoCSV — Visor GTFS</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
/* ============================================
   KAIZEN DESIGN SYSTEM v4.0
   Equipo Kaizen - Ineco
   Estilo: Flat corporativo Ineco real
   Colores oficiales del manual de marca
   ============================================ */

/* ============================================
   1. VARIABLES (TOKENS)
   ============================================ */
:root {
  /* Colores Oficiales Ineco — Manual de Marca */
  --kz-azul: #1A4488;          /* Pantone 7687 C — Color principal */
  --kz-rojo: #CB1823;          /* Pantone 485 C — Complementario */
  --kz-azul-medio: #3463AC;    /* Complementario secundario */
  --kz-azul-claro: #6B96CF;    /* Complementario terciario */

  /* Escala de azules (derivados oficiales) */
  --kz-azul-900: #0f2d5a;
  --kz-azul-800: #1A4488;
  --kz-azul-700: #22569e;
  --kz-azul-600: #3463AC;
  --kz-azul-500: #4a7fc0;
  --kz-azul-400: #6B96CF;
  --kz-azul-300: #8fb3de;
  --kz-azul-200: #b8d1ec;
  --kz-azul-100: #dce9f6;
  --kz-azul-50: #eef4fb;

  /* Escala de rojos */
  --kz-rojo-600: #a31420;
  --kz-rojo-500: #CB1823;
  --kz-rojo-400: #d9404d;
  --kz-rojo-300: #e8707a;
  --kz-rojo-200: #f4aab0;
  --kz-rojo-100: #fbd5d8;
  --kz-rojo-50: #fdf2f3;

  /* Neutrales — Grises limpios */
  --kz-negro: #1a1a2e;
  --kz-gris-900: #333333;
  --kz-gris-800: #4a4a5a;
  --kz-gris-700: #666666;
  --kz-gris-600: #808080;
  --kz-gris-500: #999999;
  --kz-gris-400: #b3b3b3;
  --kz-gris-300: #cccccc;
  --kz-gris-200: #e0e0e0;
  --kz-gris-100: #f0f0f0;
  --kz-gris-50: #f8f8f8;
  --kz-blanco: #ffffff;

  /* Semi-transparentes */
  --kz-overlay: rgba(0, 0, 0, 0.45);
  --kz-backdrop: rgba(255, 255, 255, 0.8);

  /* Tipografía — Inter */
  --kz-font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --kz-font-mono: 'JetBrains Mono', 'Fira Code', monospace;

  /* Tamaños */
  --kz-text-xs: 0.75rem;
  --kz-text-sm: 0.8125rem;
  --kz-text-base: 0.9375rem;
  --kz-text-md: 1rem;
  --kz-text-lg: 1.125rem;
  --kz-text-xl: 1.375rem;
  --kz-text-2xl: 1.75rem;
  --kz-text-3xl: 2.25rem;

  /* Espaciado */
  --kz-gap-xs: 4px;
  --kz-gap-sm: 8px;
  --kz-gap-md: 16px;
  --kz-gap-lg: 24px;
  --kz-gap-xl: 32px;
  --kz-gap-2xl: 48px;

  /* Radio — muy sutil, estilo Ineco */
  --kz-radius-sm: 4px;
  --kz-radius-md: 6px;
  --kz-radius-lg: 8px;

  /* Transiciones */
  --kz-transition: 150ms ease;

  /* Sidebar */
  --kz-sidebar-width: 380px;

  /* Header */
  --kz-header-height: 60px;
  --kz-banner-height: 44px;
}

/* ============================================
   2. RESET Y BASE
   ============================================ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--kz-font);
  font-size: var(--kz-text-base);
  line-height: 1.6;
  color: var(--kz-gris-900);
  background: var(--kz-blanco);
}

a {
  color: var(--kz-azul);
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

img {
  max-width: 100%;
  height: auto;
}

/* ============================================
   3. SIDEBAR — Estilo Ineco real
   ============================================ */
.kz-sidebar {
  position: fixed;
  left: 0;
  top: 0;
  bottom: 0;
  width: var(--kz-sidebar-width);
  background: var(--kz-blanco);
  border-right: 1px solid var(--kz-gris-200);
  overflow-y: auto;
  z-index: 100;
  padding: 0;
}

/* Categorías del sidebar (GENERAL, PERSONAL, etc.) */
.kz-sidebar-category {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  font-size: var(--kz-text-sm);
  font-weight: 700;
  color: var(--kz-azul);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 3px solid var(--kz-azul);
  cursor: pointer;
  background: var(--kz-blanco);
}

.kz-sidebar-category:hover {
  background: var(--kz-azul-50);
}

.kz-sidebar-category::after {
  content: '▾';
  font-size: 10px;
  color: var(--kz-azul);
}

/* Items del sidebar */
.kz-sidebar-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px 10px 28px;
  font-size: var(--kz-text-sm);
  color: var(--kz-gris-800);
  cursor: pointer;
  border-bottom: 1px solid var(--kz-gris-100);
}

.kz-sidebar-item:hover {
  background: var(--kz-azul-50);
  color: var(--kz-azul);
}

.kz-sidebar-item::after {
  content: '▾';
  font-size: 9px;
  color: var(--kz-gris-400);
}

/* ============================================
   4. HEADER — Barra azul superior
   ============================================ */
.kz-header {
  background: var(--kz-blanco);
  border-bottom: 1px solid var(--kz-gris-200);
  height: var(--kz-header-height);
  display: flex;
  align-items: center;
  padding: 0 var(--kz-gap-lg);
  gap: var(--kz-gap-lg);
}

/* Buscador en header */
.kz-search {
  display: flex;
  align-items: center;
  gap: var(--kz-gap-sm);
}

.kz-search-label {
  font-size: var(--kz-text-xs);
  font-weight: 700;
  color: var(--kz-azul);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.kz-search-input {
  border: 1px solid var(--kz-gris-300);
  border-radius: var(--kz-radius-sm);
  padding: 6px 12px;
  font-size: var(--kz-text-sm);
  width: 200px;
  outline: none;
}

.kz-search-input:focus {
  border-color: var(--kz-azul);
}

.kz-search-btn {
  background: var(--kz-azul);
  color: var(--kz-blanco);
  border: none;
  border-radius: var(--kz-radius-sm);
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 14px;
}

.kz-search-btn:hover {
  background: var(--kz-azul-700);
}

/* Iconos de header (Soporte, Personae, etc.) */
.kz-header-icons {
  display: flex;
  gap: var(--kz-gap-xl);
  margin-left: auto;
}

.kz-header-icon {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  color: var(--kz-azul);
  font-size: var(--kz-text-xs);
  text-decoration: none;
}

.kz-header-icon:hover {
  color: var(--kz-azul-600);
  text-decoration: none;
}

.kz-header-icon-symbol {
  font-size: 20px;
}

/* Logos */
.kz-header-logo {
  margin-left: auto;
  font-size: var(--kz-text-2xl);
  font-weight: 800;
  color: var(--kz-azul);
  letter-spacing: -0.5px;
}

.kz-header-logo-red {
  color: var(--kz-rojo);
}

/* ============================================
   5. BANNER — Barra de bienvenida azul
   ============================================ */
.kz-banner {
  background: linear-gradient(135deg, var(--kz-azul) 0%, var(--kz-azul-medio) 100%);
  color: var(--kz-blanco);
  height: var(--kz-banner-height);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--kz-gap-lg);
  font-size: var(--kz-text-sm);
}

.kz-banner-greeting {
  font-weight: 500;
}

.kz-banner-date {
  font-weight: 400;
  opacity: 0.9;
}

/* ============================================
   6. SECCIONES — Estilo Ineco real
   ============================================ */
.kz-section {
  padding: var(--kz-gap-lg) var(--kz-gap-xl);
}

/* Título de sección — azul, bold, uppercase, línea debajo */
.kz-section-title {
  font-size: var(--kz-text-md);
  font-weight: 700;
  color: var(--kz-azul);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  padding-bottom: var(--kz-gap-sm);
  border-bottom: 2px solid var(--kz-azul);
  margin-bottom: var(--kz-gap-lg);
}

/* Subtítulo de sección */
.kz-section-subtitle {
  font-size: var(--kz-text-sm);
  color: var(--kz-gris-600);
  margin-top: calc(-1 * var(--kz-gap-sm));
  margin-bottom: var(--kz-gap-lg);
}

/* Separador horizontal simple */
.kz-divider {
  border: none;
  border-top: 1px solid var(--kz-gris-200);
  margin: var(--kz-gap-lg) 0;
}

/* ============================================
   7. GRID — Layout de contenido
   ============================================ */
.kz-grid {
  display: grid;
  gap: var(--kz-gap-lg);
}

.kz-grid-2 { grid-template-columns: repeat(2, 1fr); }
.kz-grid-3 { grid-template-columns: repeat(3, 1fr); }
.kz-grid-4 { grid-template-columns: repeat(4, 1fr); }
.kz-grid-6 { grid-template-columns: repeat(6, 1fr); }

.kz-grid-sidebar {
  grid-template-columns: var(--kz-sidebar-width) 1fr;
}

/* ============================================
   8. TILES / KPI — Estilo Ineco
   ============================================ */
.kz-tile {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--kz-gap-sm);
  padding: var(--kz-gap-md);
  background: var(--kz-blanco);
  border: 1px solid var(--kz-gris-200);
  border-radius: var(--kz-radius-md);
  cursor: pointer;
  transition: background var(--kz-transition);
  text-align: center;
}

.kz-tile:hover {
  background: var(--kz-azul-50);
  border-color: var(--kz-azul-300);
}

.kz-tile-icon {
  font-size: 28px;
  color: var(--kz-azul);
}

.kz-tile-label {
  font-size: var(--kz-text-sm);
  color: var(--kz-gris-800);
  font-weight: 500;
}

.kz-tile-value {
  font-size: var(--kz-text-2xl);
  font-weight: 700;
  color: var(--kz-azul);
}

.kz-tile-unit {
  font-size: var(--kz-text-xs);
  color: var(--kz-gris-600);
  font-weight: 400;
}

/* ============================================
   9. BOTONES — Limpios, sin sombras
   ============================================ */
.kz-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 16px;
  font-family: var(--kz-font);
  font-size: var(--kz-text-sm);
  font-weight: 500;
  border: 1px solid transparent;
  border-radius: var(--kz-radius-sm);
  cursor: pointer;
  transition: all var(--kz-transition);
  text-decoration: none;
  line-height: 1.4;
}

.kz-btn:hover {
  text-decoration: none;
}

/* Primario — Azul Ineco */
.kz-btn-primary {
  background: var(--kz-azul);
  color: var(--kz-blanco);
  border-color: var(--kz-azul);
}

.kz-btn-primary:hover {
  background: var(--kz-azul-700);
  border-color: var(--kz-azul-700);
}

/* Secundario — Borde azul */
.kz-btn-secondary {
  background: var(--kz-blanco);
  color: var(--kz-azul);
  border-color: var(--kz-azul);
}

.kz-btn-secondary:hover {
  background: var(--kz-azul-50);
}

/* Acento — Rojo Ineco */
.kz-btn-accent {
  background: var(--kz-rojo);
  color: var(--kz-blanco);
  border-color: var(--kz-rojo);
}

.kz-btn-accent:hover {
  background: var(--kz-rojo-600);
  border-color: var(--kz-rojo-600);
}

/* Fantasma — Transparente */
.kz-btn-ghost {
  background: transparent;
  color: var(--kz-azul);
  border-color: transparent;
}

.kz-btn-ghost:hover {
  background: var(--kz-azul-50);
}

/* Tamaños */
.kz-btn-sm { padding: 5px 10px; font-size: var(--kz-text-xs); }
.kz-btn-lg { padding: 12px 24px; font-size: var(--kz-text-md); }

/* ============================================
   10. TABLA — Línea bajo encabezado
   ============================================ */
.kz-table-wrapper {
  overflow-x: auto;
}

.kz-table {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--kz-text-sm);
}

.kz-table thead th {
  text-align: left;
  font-weight: 600;
  font-size: var(--kz-text-xs);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--kz-azul);
  padding: 10px 16px;
  border-bottom: 2px solid var(--kz-azul);
}

.kz-table tbody td {
  padding: 10px 16px;
  border-bottom: 1px solid var(--kz-gris-100);
  color: var(--kz-gris-900);
}

.kz-table tbody tr:hover {
  background: var(--kz-azul-50);
}

/* ============================================
   11. FORMULARIOS — Limpios
   ============================================ */
.kz-form-group {
  margin-bottom: var(--kz-gap-md);
}

.kz-label {
  display: block;
  font-size: var(--kz-text-sm);
  font-weight: 500;
  color: var(--kz-gris-800);
  margin-bottom: var(--kz-gap-xs);
}

.kz-input,
.kz-select,
.kz-textarea {
  width: 100%;
  padding: 8px 12px;
  font-family: var(--kz-font);
  font-size: var(--kz-text-sm);
  color: var(--kz-gris-900);
  background: var(--kz-blanco);
  border: 1px solid var(--kz-gris-300);
  border-radius: var(--kz-radius-sm);
  outline: none;
  transition: border-color var(--kz-transition);
}

.kz-input:focus,
.kz-select:focus,
.kz-textarea:focus {
  border-color: var(--kz-azul);
}

.kz-hint {
  font-size: var(--kz-text-xs);
  color: var(--kz-gris-600);
  margin-top: 2px;
}

.kz-textarea {
  min-height: 80px;
  resize: vertical;
}

/* ============================================
   12. CAROUSEL / TARJETAS DE IMÁGENES
   ============================================ */
.kz-carousel {
  display: flex;
  gap: var(--kz-gap-md);
  overflow-x: auto;
  padding: var(--kz-gap-sm) 0;
  scroll-snap-type: x mandatory;
}

.kz-carousel-item {
  flex: 0 0 auto;
  width: 200px;
  height: 120px;
  border-radius: var(--kz-radius-md);
  overflow: hidden;
  scroll-snap-align: start;
  position: relative;
  background: var(--kz-gris-100);
}

.kz-carousel-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.kz-carousel-label {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 8px 12px;
  background: var(--kz-overlay);
  color: var(--kz-blanco);
  font-size: var(--kz-text-xs);
  font-weight: 500;
}

/* ============================================
   13. TARJETAS DE NOTICIAS
   ============================================ */
.kz-news {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--kz-gap-lg);
  align-items: start;
}

.kz-news-main {
  display: flex;
  gap: var(--kz-gap-lg);
  align-items: center;
}

.kz-news-image {
  width: 280px;
  height: 160px;
  background: var(--kz-gris-100);
  border-radius: var(--kz-radius-md);
  flex-shrink: 0;
  overflow: hidden;
}

.kz-news-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.kz-news-title {
  font-size: var(--kz-text-lg);
  font-weight: 600;
  color: var(--kz-gris-900);
  margin-bottom: var(--kz-gap-sm);
  line-height: 1.3;
}

.kz-news-excerpt {
  font-size: var(--kz-text-sm);
  color: var(--kz-gris-700);
  line-height: 1.6;
}

.kz-news-link {
  display: inline-block;
  margin-top: var(--kz-gap-sm);
  font-size: var(--kz-text-sm);
  color: var(--kz-azul);
  font-weight: 500;
}

/* ============================================
   14. AVISO / BANNER INFORMATIVO
   ============================================ */
.kz-notice {
  background: var(--kz-azul-50);
  border-left: 4px solid var(--kz-azul);
  padding: var(--kz-gap-md) var(--kz-gap-lg);
  font-size: var(--kz-text-sm);
  color: var(--kz-gris-800);
}

.kz-notice-error {
  background: var(--kz-rojo-50);
  border-left-color: var(--kz-rojo);
}

.kz-notice-success {
  background: #f0fdf4;
  border-left-color: #16a34a;
}

/* ============================================
   15. BADGE / ETIQUETA
   ============================================ */
.kz-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  font-size: var(--kz-text-xs);
  font-weight: 500;
  border-radius: var(--kz-radius-sm);
  background: var(--kz-azul-50);
  color: var(--kz-azul);
}

.kz-badge-success {
  background: #f0fdf4;
  color: #16a34a;
}

.kz-badge-warning {
  background: #fffbeb;
  color: #d97706;
}

.kz-badge-error {
  background: var(--kz-rojo-50);
  color: var(--kz-rojo);
}

/* ============================================
   16. TABS — Pestañas simples
   ============================================ */
.kz-tabs {
  display: flex;
  gap: 0;
  border-bottom: 2px solid var(--kz-gris-200);
}

.kz-tab {
  padding: 10px 20px;
  font-size: var(--kz-text-sm);
  font-weight: 500;
  color: var(--kz-gris-600);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all var(--kz-transition);
}

.kz-tab:hover {
  color: var(--kz-azul);
}

.kz-tab-active {
  color: var(--kz-azul);
  border-bottom-color: var(--kz-azul);
  font-weight: 600;
}

/* ============================================
   17. MAPA / CONTENIDO EMBED
   ============================================ */
.kz-map-container {
  width: 100%;
  height: 400px;
  background: var(--kz-gris-100);
  border-radius: var(--kz-radius-md);
  overflow: hidden;
  position: relative;
}

/* ============================================
   18. DROPZONE — Zona de carga de archivos
   ============================================ */
.kz-dropzone {
  border: 2px dashed var(--kz-gris-300);
  border-radius: var(--kz-radius-lg);
  padding: var(--kz-gap-lg) var(--kz-gap-md);
  text-align: center;
  cursor: pointer;
  transition: all var(--kz-transition);
  background: var(--kz-blanco);
}

.kz-dropzone:hover,
.kz-dropzone.kz-dropzone-active {
  border-color: var(--kz-azul);
  background: var(--kz-azul-50);
}

.kz-dropzone-icon {
  font-size: 32px;
  margin-bottom: var(--kz-gap-sm);
  color: var(--kz-gris-400);
}

.kz-dropzone-text {
  font-size: var(--kz-text-sm);
  color: var(--kz-gris-700);
  margin-bottom: var(--kz-gap-xs);
}

.kz-dropzone-text strong {
  color: var(--kz-azul);
  font-weight: 600;
}

.kz-dropzone-hint {
  font-size: var(--kz-text-xs);
  color: var(--kz-gris-500);
}

.kz-dropzone.kz-dropzone-active {
  border-style: solid;
}

/* ============================================
   19. RANGE SLIDER — Input de rango estilizado
   ============================================ */
.kz-slider-row {
  display: flex;
  align-items: center;
  gap: var(--kz-gap-md);
}

.kz-slider {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: var(--kz-gris-200);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}

.kz-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--kz-azul);
  border: 2px solid var(--kz-blanco);
  cursor: pointer;
  transition: background var(--kz-transition);
}

.kz-slider::-moz-range-thumb {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--kz-azul);
  border: 2px solid var(--kz-blanco);
  cursor: pointer;
}

.kz-slider::-webkit-slider-thumb:hover {
  background: var(--kz-azul-700);
}

.kz-slider-value {
  font-size: var(--kz-text-sm);
  font-weight: 600;
  color: var(--kz-azul);
  min-width: 48px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

/* ============================================
   20. PROGRESS BAR — Barra de progreso
   ============================================ */
.kz-progress {
  width: 100%;
  height: 6px;
  background: var(--kz-gris-100);
  border-radius: 3px;
  overflow: hidden;
}

.kz-progress-fill {
  height: 100%;
  background: var(--kz-azul);
  border-radius: 3px;
  transition: width 0.3s ease;
  width: 0%;
}

.kz-progress-fill-success {
  background: #16a34a;
}

.kz-progress-fill-warning {
  background: #d97706;
}

.kz-progress-fill-error {
  background: var(--kz-rojo);
}

.kz-progress-indeterminate .kz-progress-fill {
  width: 30%;
  animation: kz-progress-slide 1.5s ease-in-out infinite;
}

@keyframes kz-progress-slide {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(400%); }
}

/* ============================================
   21. LOADING STATES — Spinners y overlays
   ============================================ */
.kz-spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--kz-gris-200);
  border-top-color: var(--kz-azul);
  border-radius: 50%;
  animation: kz-spin 0.8s linear infinite;
}

.kz-spinner-sm {
  width: 16px;
  height: 16px;
  border-width: 2px;
}

.kz-spinner-lg {
  width: 48px;
  height: 48px;
  border-width: 4px;
}

@keyframes kz-spin {
  to { transform: rotate(360deg); }
}

.kz-loading-overlay {
  position: fixed;
  inset: 0;
  background: var(--kz-overlay);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.kz-loading-card {
  background: var(--kz-blanco);
  padding: var(--kz-gap-xl) var(--kz-gap-2xl);
  border-radius: var(--kz-radius-lg);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--kz-gap-md);
}

.kz-loading-text {
  font-size: var(--kz-text-sm);
  color: var(--kz-gris-700);
}

/* ============================================
   22. SEARCH DROPDOWN — Autocomplete
   ============================================ */
.kz-search-dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: var(--kz-blanco);
  border: 1px solid var(--kz-gris-200);
  border-radius: 0 0 var(--kz-radius-md) var(--kz-radius-md);
  max-height: 240px;
  overflow-y: auto;
  z-index: 200;
  display: none;
}

.kz-search-dropdown.kz-search-dropdown-open {
  display: block;
}

.kz-search-dropdown-item {
  padding: 10px 16px;
  font-size: var(--kz-text-sm);
  cursor: pointer;
  border-bottom: 1px solid var(--kz-gris-50);
  display: flex;
  align-items: center;
  gap: var(--kz-gap-sm);
  transition: background var(--kz-transition);
}

.kz-search-dropdown-item:hover {
  background: var(--kz-azul-50);
}

.kz-search-dropdown-item:last-child {
  border-bottom: none;
}

.kz-search-dropdown-item-name {
  font-weight: 500;
  color: var(--kz-gris-900);
}

.kz-search-dropdown-item-meta {
  font-size: var(--kz-text-xs);
  color: var(--kz-gris-500);
}

/* ============================================
   23. PANEL / DRAWER — Paneles deslizantes
   ============================================ */
.kz-panel {
  position: fixed;
  background: var(--kz-blanco);
  border-top: 2px solid var(--kz-azul);
  z-index: 1000;
  transform: translateY(100%);
  transition: transform 0.3s ease;
  overflow-y: auto;
}

.kz-panel-bottom {
  bottom: 0;
  left: var(--kz-sidebar-width);
  right: 0;
  max-height: 45vh;
}

.kz-panel-right {
  top: 0;
  right: 0;
  bottom: 0;
  width: 400px;
  max-height: 100vh;
  border-top: none;
  border-left: 2px solid var(--kz-azul);
  transform: translateX(100%);
}

.kz-panel.kz-panel-open {
  transform: translateY(0);
}

.kz-panel-right.kz-panel-open {
  transform: translateX(0);
}

.kz-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--kz-gap-sm) var(--kz-gap-lg);
  background: var(--kz-gris-50);
  border-bottom: 1px solid var(--kz-gris-200);
  position: sticky;
  top: 0;
  z-index: 1;
}

.kz-panel-header h4 {
  font-size: var(--kz-text-base);
  font-weight: 700;
}

.kz-panel-close {
  background: none;
  border: none;
  font-size: 1.3rem;
  cursor: pointer;
  color: var(--kz-gris-500);
  padding: 4px 8px;
  border-radius: var(--kz-radius-sm);
  transition: all var(--kz-transition);
}

.kz-panel-close:hover {
  background: var(--kz-gris-100);
  color: var(--kz-gris-900);
}

.kz-panel-body {
  padding: var(--kz-gap-lg);
}

/* ============================================
   24. TOGGLE / SWITCH — Interruptor on/off
   ============================================ */
.kz-toggle {
  display: inline-flex;
  align-items: center;
  gap: var(--kz-gap-sm);
  cursor: pointer;
  font-size: var(--kz-text-sm);
  color: var(--kz-gris-800);
}

.kz-toggle-input {
  position: absolute;
  opacity: 0;
  width: 0;
  height: 0;
}

.kz-toggle-track {
  width: 36px;
  height: 20px;
  background: var(--kz-gris-300);
  border-radius: 10px;
  position: relative;
  transition: background var(--kz-transition);
  flex-shrink: 0;
}

.kz-toggle-track::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 16px;
  height: 16px;
  background: var(--kz-blanco);
  border-radius: 50%;
  transition: transform var(--kz-transition);
}

.kz-toggle-input:checked + .kz-toggle-track {
  background: var(--kz-azul);
}

.kz-toggle-input:checked + .kz-toggle-track::after {
  transform: translateX(16px);
}

.kz-toggle-input:focus-visible + .kz-toggle-track {
  outline: 2px solid var(--kz-azul);
  outline-offset: 2px;
}

/* ============================================
   25. FILTER CHIPS — Pilas de filtros
   ============================================ */
.kz-chips {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.kz-chip {
  padding: 4px 12px;
  border: 1px solid var(--kz-gris-200);
  background: var(--kz-blanco);
  border-radius: var(--kz-radius-sm);
  font-size: var(--kz-text-xs);
  font-weight: 500;
  color: var(--kz-gris-700);
  cursor: pointer;
  transition: all var(--kz-transition);
  white-space: nowrap;
}

.kz-chip:hover {
  border-color: var(--kz-azul-300);
  color: var(--kz-azul);
}

.kz-chip.kz-chip-active {
  background: var(--kz-azul);
  color: var(--kz-blanco);
  border-color: var(--kz-azul);
}

.kz-chip-accent {
  border-color: var(--kz-rojo-200);
  color: var(--kz-rojo);
}

.kz-chip-accent.kz-chip-active {
  background: var(--kz-rojo);
  border-color: var(--kz-rojo);
  color: var(--kz-blanco);
}

/* ============================================
   26. TOAST / SNACKBAR — Notificaciones
   ============================================ */
.kz-toast-container {
  position: fixed;
  bottom: var(--kz-gap-lg);
  right: var(--kz-gap-lg);
  z-index: 10000;
  display: flex;
  flex-direction: column;
  gap: var(--kz-gap-sm);
}

.kz-toast {
  background: var(--kz-gris-900);
  color: var(--kz-blanco);
  padding: 12px 20px;
  border-radius: var(--kz-radius-md);
  font-size: var(--kz-text-sm);
  display: flex;
  align-items: center;
  gap: var(--kz-gap-sm);
  min-width: 280px;
  max-width: 420px;
  animation: kz-toast-in 0.3s ease;
}

.kz-toast-success {
  background: #16a34a;
}

.kz-toast-error {
  background: var(--kz-rojo);
}

.kz-toast-warning {
  background: #d97706;
}

@keyframes kz-toast-in {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ============================================
   27. STATUS INDICATOR — Puntos de estado
   ============================================ */
.kz-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: var(--kz-text-xs);
  font-weight: 500;
}

.kz-status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.kz-status-online .kz-status-dot { background: #16a34a; }
.kz-status-offline .kz-status-dot { background: var(--kz-gris-400); }
.kz-status-warning .kz-status-dot { background: #d97706; }
.kz-status-error .kz-status-dot { background: var(--kz-rojo); }

.kz-status-online { color: #16a34a; }
.kz-status-offline { color: var(--kz-gris-500); }
.kz-status-warning { color: #d97706; }
.kz-status-error { color: var(--kz-rojo); }

/* ============================================
   28. STATS ROW — KPIs horizontales
   ============================================ */
.kz-stats-row {
  display: flex;
  gap: var(--kz-gap-md);
}

.kz-stat-box {
  flex: 1;
  padding: var(--kz-gap-md);
  background: var(--kz-gris-50);
  border-radius: var(--kz-radius-md);
  text-align: center;
}

.kz-stat-box .kz-stat-val {
  font-size: var(--kz-text-xl);
  font-weight: 700;
  color: var(--kz-azul);
  font-variant-numeric: tabular-nums;
}

.kz-stat-box .kz-stat-lbl {
  font-size: var(--kz-text-xs);
  color: var(--kz-gris-600);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  margin-top: 2px;
}

/* ============================================
   29. EMPTY STATE — Sin datos
   ============================================ */
.kz-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: var(--kz-gap-2xl) var(--kz-gap-lg);
  text-align: center;
}

.kz-empty-icon {
  font-size: 48px;
  margin-bottom: var(--kz-gap-md);
  opacity: 0.4;
}

.kz-empty-title {
  font-size: var(--kz-text-md);
  font-weight: 600;
  color: var(--kz-gris-800);
  margin-bottom: var(--kz-gap-sm);
}

.kz-empty-text {
  font-size: var(--kz-text-sm);
  color: var(--kz-gris-500);
  max-width: 360px;
  line-height: 1.5;
}

/* ============================================
   30. SKELETON — Loading placeholders
   ============================================ */
.kz-skeleton {
  background: var(--kz-gris-100);
  border-radius: var(--kz-radius-sm);
  animation: kz-skeleton-pulse 1.5s ease-in-out infinite;
}

.kz-skeleton-text {
  height: 14px;
  width: 100%;
  margin-bottom: 8px;
}

.kz-skeleton-text:last-child {
  width: 60%;
}

.kz-skeleton-title {
  height: 20px;
  width: 40%;
  margin-bottom: 12px;
}

.kz-skeleton-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
}

.kz-skeleton-card {
  height: 120px;
  width: 100%;
  border-radius: var(--kz-radius-md);
}

@keyframes kz-skeleton-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* ============================================
   31. CHECKBOX / RADIO — Controles de formulario
   ============================================ */
.kz-checkbox,
.kz-radio {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: var(--kz-text-sm);
  color: var(--kz-gris-800);
  cursor: pointer;
  user-select: none;
}

.kz-checkbox-input,
.kz-radio-input {
  -webkit-appearance: none;
  appearance: none;
  width: 16px;
  height: 16px;
  border: 1.5px solid var(--kz-gris-400);
  background: var(--kz-blanco);
  cursor: pointer;
  flex-shrink: 0;
  transition: all var(--kz-transition);
}

.kz-checkbox-input {
  border-radius: 3px;
}

.kz-radio-input {
  border-radius: 50%;
}

.kz-checkbox-input:checked,
.kz-radio-input:checked {
  background: var(--kz-azul);
  border-color: var(--kz-azul);
}

.kz-checkbox-input:checked::after {
  content: '✓';
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 11px;
  font-weight: 700;
  width: 100%;
  height: 100%;
}

.kz-radio-input:checked::after {
  content: '';
  display: block;
  width: 6px;
  height: 6px;
  margin: auto;
  background: white;
  border-radius: 50%;
}

.kz-checkbox-input:focus-visible,
.kz-radio-input:focus-visible {
  outline: 2px solid var(--kz-azul);
  outline-offset: 2px;
}

/* ============================================
   32. UTILIDADES
   ============================================ */
.kz-text-azul { color: var(--kz-azul); }
.kz-text-rojo { color: var(--kz-rojo); }
.kz-text-gris { color: var(--kz-gris-600); }
.kz-text-blanco { color: var(--kz-blanco); }
.kz-text-center { text-align: center; }
.kz-text-right { text-align: right; }
.kz-text-bold { font-weight: 700; }
.kz-text-sm { font-size: var(--kz-text-sm); }
.kz-text-xs { font-size: var(--kz-text-xs); }
.kz-text-lg { font-size: var(--kz-text-lg); }
.kz-text-uppercase { text-transform: uppercase; letter-spacing: 0.5px; }

.kz-mt-0 { margin-top: 0; }
.kz-mt-sm { margin-top: var(--kz-gap-sm); }
.kz-mt-md { margin-top: var(--kz-gap-md); }
.kz-mt-lg { margin-top: var(--kz-gap-lg); }
.kz-mb-0 { margin-bottom: 0; }
.kz-mb-sm { margin-bottom: var(--kz-gap-sm); }
.kz-mb-md { margin-bottom: var(--kz-gap-md); }
.kz-mb-lg { margin-bottom: var(--kz-gap-lg); }

.kz-flex { display: flex; }
.kz-flex-center { display: flex; align-items: center; justify-content: center; }
.kz-flex-between { display: flex; align-items: center; justify-content: space-between; }
.kz-flex-col { display: flex; flex-direction: column; }
.kz-gap-sm { gap: var(--kz-gap-sm); }
.kz-gap-md { gap: var(--kz-gap-md); }
.kz-gap-lg { gap: var(--kz-gap-lg); }

.kz-w-full { width: 100%; }
.kz-hidden { display: none; }

/* ============================================
   33. RESPONSIVE
   ============================================ */
@media (max-width: 1024px) {
  .kz-grid-3 { grid-template-columns: repeat(2, 1fr); }
  .kz-grid-4 { grid-template-columns: repeat(2, 1fr); }
  .kz-grid-6 { grid-template-columns: repeat(3, 1fr); }
}

@media (max-width: 768px) {
  .kz-sidebar {
    display: none;
  }

  .kz-grid-2,
  .kz-grid-3,
  .kz-grid-4 {
    grid-template-columns: 1fr;
  }

  .kz-news {
    grid-template-columns: 1fr;
  }

  .kz-news-main {
    flex-direction: column;
  }
}

/* Estilos adicionales del visor */
:root { --header-h: 60px; --sidebar-w: 380px; }
body { font-family: var(--kz-font); background: var(--kz-gris-50); }
#header { position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
  background: var(--kz-azul); color: white; z-index: 2000;
  display: flex; align-items: center; padding: 0 20px; gap: 16px; }
#header h1 { font-size: var(--kz-text-lg); font-weight: 600; }
#header .subtitle { font-size: var(--kz-text-sm); opacity: 0.8; }
#header .kz-badge { margin-left: auto; }
#sidebar { position: fixed; top: var(--header-h); left: 0; bottom: 0;
  width: var(--sidebar-w); background: white; border-right: 1px solid var(--kz-gris-300);
  z-index: 1000; overflow-y: auto; display: flex; flex-direction: column; }
.sidebar-scroll { flex: 1; overflow-y: auto; padding: 12px; }
#map { position: fixed; top: var(--header-h); left: var(--sidebar-w); right: 0; bottom: 0; z-index: 500; }
.dropzone { border: 2px dashed var(--kz-azul-claro); border-radius: var(--kz-radius-lg);
  padding: 20px; text-align: center; margin: 8px 0; cursor: pointer;
  transition: all .2s; background: var(--kz-azul-50); }
.dropzone:hover { border-color: var(--kz-azul); background: var(--kz-azul-100); }
.dropzone.dragover { border-color: var(--kz-azul); background: var(--kz-azul-100); transform: scale(1.01); }
.dropzone-icon { font-size: 2rem; }
.dropzone-text { font-size: var(--kz-text-sm); color: var(--kz-gris-600); }
#stats-bar { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0; }
.stat-chip { background: var(--kz-azul-50); color: var(--kz-azul); padding: 4px 10px;
  border-radius: 20px; font-size: var(--kz-text-xs); font-weight: 500; }
.route-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px;
  border-bottom: 1px solid var(--kz-gris-100); cursor: pointer;
  transition: background .15s; border-radius: var(--kz-radius-sm); }
.route-item:hover { background: var(--kz-azul-50); }
.route-item.active { background: var(--kz-azul-100); }
.route-badge { width: 20px; height: 20px; border-radius: 4px; display: flex;
  align-items: center; justify-content: center; font-size: 10px; font-weight: 700;
  color: white; flex-shrink: 0; }
.route-info { flex: 1; min-width: 0; }
.route-name { font-size: var(--kz-text-sm); font-weight: 500; }
.route-detail { font-size: var(--kz-text-xs); color: var(--kz-gris-500); }
.route-actions { display: flex; gap: 4px; }
.route-actions button { background: none; border: 1px solid var(--kz-gris-300);
  border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer;
  transition: all .15s; }
.route-actions button:hover { background: var(--kz-azul-50); border-color: var(--kz-azul-claro); }
.section-title { font-size: var(--kz-text-sm); font-weight: 600; color: var(--kz-azul);
  padding: 10px 0 6px; border-bottom: 2px solid var(--kz-azul); margin-bottom: 8px;
  display: flex; justify-content: space-between; align-items: center; }
.section-title .btn-export { font-size: var(--kz-text-xs); padding: 2px 8px; }
.table-wrap { overflow-x: auto; max-height: 300px; overflow-y: auto;
  border: 1px solid var(--kz-gris-200); border-radius: var(--kz-radius-md); }
table.kz-table { font-size: var(--kz-text-xs); }
table.kz-table th { position: sticky; top: 0; z-index: 2; }
table.kz-table td, table.kz-table th { padding: 4px 6px; white-space: nowrap; }

/* Panel de ruta (slide from right) */
#route-panel { position: fixed; top: var(--header-h); right: 0; bottom: 0;
  width: 480px; background: white; border-left: 2px solid var(--kz-azul);
  z-index: 1500; transform: translateX(100%); transition: transform .3s ease;
  overflow-y: auto; display: flex; flex-direction: column; }
#route-panel.open { transform: translateX(0); }
#route-panel .panel-header { padding: 16px; border-bottom: 1px solid var(--kz-gris-200);
  display: flex; align-items: center; gap: 12px; }
#route-panel .panel-header h2 { font-size: var(--kz-text-lg); flex: 1; }
#route-panel .panel-close { background: none; border: none; font-size: 1.5rem;
  cursor: pointer; color: var(--kz-gris-500); padding: 4px; line-height: 1; }
#route-panel .panel-body { padding: 16px; flex: 1; overflow-y: auto; }

/* Panel de parada (slide from right) */
#stop-panel { position: fixed; top: var(--header-h); right: 0; bottom: 0;
  width: 520px; background: white; border-left: 2px solid var(--kz-azul-claro);
  z-index: 1600; transform: translateX(100%); transition: transform .3s ease;
  overflow-y: auto; display: flex; flex-direction: column; }
#stop-panel.open { transform: translateX(0); }
#stop-panel .panel-header { padding: 16px; border-bottom: 1px solid var(--kz-gris-200);
  display: flex; align-items: center; gap: 12px; background: var(--kz-azul-50); }
#stop-panel .panel-header h2 { font-size: var(--kz-text-lg); flex: 1; color: var(--kz-azul); }
#stop-panel .panel-close { background: none; border: none; font-size: 1.5rem;
  cursor: pointer; color: var(--kz-gris-500); padding: 4px; line-height: 1; }
#stop-panel .panel-body { padding: 16px; flex: 1; overflow-y: auto; }

<!-- HEADER KAIZEN -->
<div id="header">

function renderCatalog(operadores) {
  const grid = document.getElementById('catalog-grid');
  grid.innerHTML = operadores.map(op => {
    const tipo = op.tipo && op.tipo[0];
    const tipoIcon = CATALOG_TYPES[tipo] || '🚍';
    const tipoClass = CATALOG_ICONS[tipo] || 'bus';
    const region = op.regiones && op.regiones.length ? op.regiones[0] : '';
    const rutas = op.num_rutas || '?';
    const paradas = op.num_paradas || '?';
    const tam = op.tamanio_kb ? (op.tamanio_kb > 1000 ? (op.tamanio_kb/1000).toFixed(1)+'MB' : op.tamanio_kb+'KB') : '';
    return `<div class="catalog-card" onclick="showOperatorDetail(${op.id})">
      <h4>${tipoIcon} ${op.nombre}</h4>
      <div class="catalog-org">${op.organizacion || ''}</div>
      <div class="catalog-meta">
        <span class="catalog-badge ${tipoClass}">${tipo || ''}</span>
      </div>
      <div class="catalog-stats">${rutas} rutas · ${paradas} paradas${tam ? ' · '+tam : ''}</div>
      <div class="catalog-region">${region ? '📍 '+region : ''}</div>
    </div>`;
  }).join('');
}

function filterCatalog(query) {
  const q = query.toLowerCase().trim();
  if (!q) { renderCatalog(OPERADORES); return; }
  const filtered = OPERADORES.filter(op =>
    (op.nombre && op.nombre.toLowerCase().includes(q)) ||
    (op.organizacion && op.organizacion.toLowerCase().includes(q)) ||
    (op.tipo && op.tipo.some(t => t.toLowerCase().includes(q))) ||
    (op.regiones && op.regiones.some(r => r.toLowerCase().includes(q)))
  );
  renderCatalog(filtered);
}

function showOperatorDetail(id) {
  const op = OPERADORES.find(o => o.id === id);

  const tipo = op.tipo && op.tipo[0];

async function loadGTFSZip(file) {
  showToast(`📦 Cargando ${file.name}...`);
  try {
    const arrayBuffer = await file.arrayBuffer();
    const zip = await JSZip.loadAsync(arrayBuffer);
    const data = await parseGTFSZip(zip, file.name);
    renderAll(data);
    showToast(`✅ ${file.name} — ${data.routes.length} rutas, ${data.stops.length} paradas`);
  } catch(e) {
    showToast('❌ Error al cargar GTFS: ' + e.message);
    console.error(e);
  }
}

async function parseGTFSZip(zip, filename) {
  function csvParse(text) {
    const lines = text.trim().split('\n'); if (lines.length < 2) return [];
    const delim = detectDelim(lines[0]);
    const headers = lines[0].split(delim).map(h => h.trim().replace(/^"|"$/g,''));
    const result = [];
    for (let i = 1; i < lines.length; i++) {
      const vals = parseCSVLine(lines[i], delim);
      if (vals.length !== headers.length) continue;
      const row = {};
      for (let j = 0; j < headers.length; j++) row[headers[j]] = vals[j] || '';
      result.push(row);
    }
    return result;
  }
  function detectDelim(line) {
    const c = (line.match(/,/g)||[]).length, t = (line.match(/\t/g)||[]).length, s = (line.match(/;/g)||[]).length;
    if (t > c && t > s) return '\t'; if (s > c) return ';'; return ',';
  }
  function parseCSVLine(line, delim) {
    const r = []; let c = '', q = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') q = !q;
      else if (line[i] === delim && !q) { r.push(c.trim()); c = ''; }
      else c += line[i];
    }
    r.push(c.trim()); return r;
  }

  const routes = await getZipText(zip, 'routes.txt').then(t => t ? csvParse(t) : []);
  const stops = await getZipText(zip, 'stops.txt').then(t => t ? csvParse(t) : []);
  const trips = await getZipText(zip, 'trips.txt').then(t => t ? csvParse(t) : []);
  const stopTimes = await getZipText(zip, 'stop_times.txt').then(t => t ? csvParse(t) : []);
  const shapes = await getZipText(zip, 'shapes.txt').then(t => t ? csvParse(t) : []);
  const agency = await getZipText(zip, 'agency.txt').then(t => t ? csvParse(t) : []);
  const calendar = await getZipText(zip, 'calendar.txt').then(t => t ? csvParse(t) : []);
  const calDates = await getZipText(zip, 'calendar_dates.txt').then(t => t ? csvParse(t) : []);
  const frequencies = await getZipText(zip, 'frequencies.txt').then(t => t ? csvParse(t) : []);
  const transfers = await getZipText(zip, 'transfers.txt').then(t => t ? csvParse(t) : []);
  const feedInfo = await getZipText(zip, 'feed_info.txt').then(t => t ? csvParse(t) : []);

  // Build indexes
  const stopsById = {}; stops.forEach(s => stopsById[s.stop_id] = s);
  const routesById = {}; routes.forEach(r => routesById[r.route_id] = r);
  const tripsByRoute = {}; trips.forEach(t => {
    if (!tripsByRoute[t.route_id]) tripsByRoute[t.route_id] = [];
    tripsByRoute[t.route_id].push(t);
  });
  const stopTimesByTrip = {}; stopTimes.forEach(st => {
    if (!stopTimesByTrip[st.trip_id]) stopTimesByTrip[st.trip_id] = [];
    stopTimesByTrip[st.trip_id].push(st);
  });
  const shapesCoords = {}; shapes.forEach(s => {
    if (!shapesCoords[s.shape_id]) shapesCoords[s.shape_id] = [];
    shapesCoords[s.shape_id].push([parseFloat(s.shape_pt_lat), parseFloat(s.shape_pt_lon)]);
  });
  const routeShapeMap = {};
  trips.forEach(t => { if (t.shape_id && shapesCoords[t.shape_id] && !routeShapeMap[t.route_id]) routeShapeMap[t.route_id] = t.shape_id; });

  // Build routesByStop: stop_id -> array of {route_id, route_name, route_color, route_short_name, trip_headsign, departure_time, trip_id}
  const _routesByStop = {};
  stopTimes.forEach(st => {
    const stopId = st.stop_id;
    if (!_routesByStop[stopId]) _routesByStop[stopId] = [];
    // Find trip and route for this stop_time
    const trip = trips.find(t => t.trip_id === st.trip_id);
    if (!trip) return;
    const route = routesById[trip.route_id];
    if (!route) return;
    _routesByStop[stopId].push({
      route_id: trip.route_id,
      route_name: route.route_long_name || route.route_short_name || trip.route_id,
      route_short_name: route.route_short_name || '',
      route_color: route.route_color || '',
      route_type: route.route_type || '',
      trip_headsign: trip.trip_headsign || '',
      departure_time: st.departure_time || st.arrival_time || '',
      trip_id: st.trip_id,
      stop_sequence: parseInt(st.stop_sequence) || 0
    });
  });

  // Build stopsByRoute: route_id -> array of stop_ids
  const _stopsByRoute = {};
  routes.forEach(r => {
    const rid = r.route_id;
    const trips = tripsByRoute[rid] || [];
    const orderedStops = getOrderedStops(rid, trips, stopTimesByTrip, stopsById);
    _stopsByRoute[rid] = orderedStops.map(s => s.stop_id).filter(Boolean);
  });

  // Build routes data
  const resultRoutes = routes.map(r => {
    const rid = r.route_id;
    const trips = tripsByRoute[rid] || [];
    const firstTrip = trips[0];
    const shapeId = routeShapeMap[rid];
    const coords = shapeId ? (shapesCoords[shapeId] || []) : [];
    const headsigns = [...new Set(trips.map(t => t.trip_headsign).filter(Boolean))];
    const stops = getOrderedStops(rid, trips, stopTimesByTrip, stopsById);
    return {
      id: rid, short_name: r.route_short_name || '', long_name: r.route_long_name || '',
      type: r.route_type || '', color: r.route_color || '', text_color: r.route_text_color || '',
      agency_id: r.agency_id || '', num_trips: trips.length, num_stops: stops.length,
      headsigns, has_shape: coords.length > 0, shape_km: calcLength(coords)
    };
  });

  const resultStops = stops.filter(s => {
    const lat = parseFloat(s.stop_lat), lon = parseFloat(s.stop_lon);
    return !isNaN(lat) && !isNaN(lon) && !(lat === 0 && lon === 0);
  }).map(s => ({ id: s.stop_id, name: s.stop_name, lat: parseFloat(s.stop_lat), lon: parseFloat(s.stop_lon), code: s.stop_code || '' }));

  window._rawData = { routes, stops, trips, stopTimes, shapes, agency, calendar, calDates, frequencies, transfers, feedInfo };
  window._routesByStop = _routesByStop;
  window._stopsByRoute = _stopsByRoute;
  window._stopsById = stopsById;
  window._routesById = routesById;
  window._stopTimesByTrip = stopTimesByTrip;
  window._tripsByRoute = tripsByRoute;

  return { meta: { filename, agency: agency.map(a => a.agency_name).filter(Boolean) }, routes: resultRoutes, stops: resultStops, shapes: shapesCoords, route_shape_map: routeShapeMap };
}

function getZipText(zip, name) { return zip.file(name) ? zip.file(name).async('string').catch(() => '') : Promise.resolve(''); }

function getOrderedStops(routeId, trips, stopTimesByTrip, stopsById) {
  let bestTrip = null, maxStops = 0;
  trips.forEach(t => {
    const sts = stopTimesByTrip[t.trip_id] || [];
    if (sts.length > maxStops) { maxStops = sts.length; bestTrip = sts; }
  });
  if (!bestTrip) return [];
  bestTrip.sort((a,b) => parseInt(a.stop_sequence||0) - parseInt(b.stop_sequence||0));
  return bestTrip.map(st => ({ ...(stopsById[st.stop_id] || {}), departure_time: st.departure_time })).filter(s => s.stop_id);
}

function calcLength(coords) {
  if (coords.length < 2) return 0;
  let total = 0; const R = 6371;
  for (let i = 1; i < coords.length; i++) {
    const [lat1, lon1] = coords[i-1], [lat2, lon2] = coords[i];
    const dlat = (lat2-lat1)*Math.PI/180, dlon = (lon2-lon1)*Math.PI/180;
    const a = Math.sin(dlat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dlon/2)**2;
    total += R * 2 * Math.asin(Math.sqrt(a));
  }
  return Math.round(total*100)/100;
}

function renderAll(data) {
  allRoutes = data.routes;
  allStops = data.stops;
  allShapes = data.shapes;
  routeShapeMap = data.route_shape_map;
  window._routesData = allRoutes;

  // Swap UI: hide catalog, show GTFS content

  document.getElementById('gtfs-content').classList.add('visible');

  // Update header
  const agency = data.meta.agency.length ? data.meta.agency.join(', ') : data.meta.filename;
  document.getElementById('header-status').textContent = `${allRoutes.length} rutas | ${allStops.length} paradas`;

  // Stats
  const types = new Set(allRoutes.map(r => r.type).filter(Boolean));
  const hasShape = allRoutes.filter(r => r.has_shape).length;
  document.getElementById('stats-bar').innerHTML =
    `<span class="stat-chip">🚏 ${allStops.length} paradas</span>` +
    `<span class="stat-chip">🚍 ${allRoutes.length} rutas</span>` +
    `<span class="stat-chip">📐 ${hasShape} con trazado</span>` +
    `<span class="stat-chip">🏢 ${agency}</span>`;

  // Fit map to first route with shape, or Spain
  const firstWithShape = allRoutes.find(r => r.has_shape);

    const coords = allShapes[routeShapeMap[firstWithShape.id]];
    if (coords) map.fitBounds(coords, { padding: [30,30] });

  renderRoutes(allRoutes);
  renderStopsOnMap(allStops);
  renderTablesAccordion();
}

function renderRoutes(routes) {
  const container = document.getElementById('route-list');
  container.innerHTML = routes.map(r => {
    const color = r.color ? `#${r.color}` : COLORS[routes.indexOf(r) % COLORS.length];
    const textColor = r.text_color ? `#${r.text_color}` : '#fff';
    const typeLabel = ROUTE_TYPES[r.type] || `🚍 Tipo ${r.type}`;
    return `<div class="route-item" data-id="${r.id}" onclick="openRoute('${r.id}')">
      <div class="route-badge" style="background:${color};color:${textColor}">${r.short_name || '?'}</div>
      <div class="route-info">
        <div class="route-name">${r.long_name || r.short_name || 'Ruta ' + r.id}</div>
        <div class="route-detail">${typeLabel} · ${r.num_trips} viajes · ${r.num_stops} paradas${r.shape_km ? ' · '+r.shape_km+' km' : ''}</div>
      </div>
      <div class="route-actions">
        <button title="GeoJSON" onclick="event.stopPropagation();downloadRouteGeoJSON('${r.id}')">🌐</button>
        <button title="CSV Horarios" onclick="event.stopPropagation();downloadRouteCSV('${r.id}')">📋</button>
      </div>

  }).join('');
}

function renderStopsOnMap(stops) {
  const icon = L.divIcon({

    iconSize: [8,8], iconAnchor: [4,4], className: ''
  });
  const markers = L.layerGroup();
  stopMarkers = [];
  stops.forEach(s => {
    const marker = L.marker([s.lat, s.lon], { icon });
    marker.bindPopup(
      `<b>${s.name}</b><br><small>ID: ${s.id}${s.code ? ' · Cód: '+s.code : ''}</small><br>` +
      `<a href="#" onclick="event.preventDefault();openStopPanel('${s.id}')" style="color:var(--kz-azul);font-size:12px;text-decoration:underline">⏰ Ver horarios de esta parada</a>`
    );
    marker._stopId = s.id;
    markers.addLayer(marker);
    stopMarkers.push(marker);

}

function renderTablesAccordion() {
  const container = document.getElementById('tables-accordion');
  const tables = ['agency','routes','trips','stop_times','stops','shapes','calendar','calendar_dates','frequencies','transfers','feed_info','attributions'];
  const labels = { agency:'🏢 Agencia', routes:'📋 Rutas', trips:'🎫 Viajes', stop_times:'⏰ Stop Times', stops:'🚏 Paradas', shapes:'📐 Shapes', calendar:'🗓️ Calendar', calendar_dates:'📅 Calendar Dates', frequencies:'🔄 Frecuencias', transfers:'🔀 Transferencias', feed_info:'ℹ️ Feed Info', attributions:'© Atribuciones' };
  const raw = window._rawData || {};
  let html = '';
  tables.forEach(t => {
    const data = raw[t];
    if (!data || !data.length) return;
    const keys = Object.keys(data[0]);
    let rows = data.slice(0, 50).map(row =>
      '<tr>' + keys.map(k => `<td>${(row[k]||'').toString().substring(0,50)}</td>`).join('') + '</tr>'
    ).join('');
    const total = data.length;
    html += `<div class="accordion">
      <div class="accordion-header" onclick="this.parentElement.classList.toggle('open')">
        <span>${labels[t] || t} (${total})</span>
        <span class="accordion-icon">▼</span>
      </div>
      <div class="accordion-body">
        <button class="kz-btn kz-btn-sm kz-btn-ghost" onclick="exportTableCSV(window._rawData['${t}'], '${t}')" style="margin:8px 0">📥 Exportar CSV</button>
        <div class="table-wrap">
          <table class="kz-table">
            <thead><tr>${keys.map(k => '<th>'+k+'</th>').join('')}</tr></thead>
            <tbody>${rows}</tbody>
          </table>
          ${total > 50 ? '<div style="padding:8px;text-align:center;color:var(--kz-gris-500);font-size:var(--kz-text-xs)">Mostrando 50 de '+total+' filas. Exporta CSV para ver todas.</div>' : ''}
        </div>
      </div>
    </div>`;
  });
  container.innerHTML = html || '<div class="no-data">Carga un GTFS para ver los datos</div>';
}

function filterRoutes(query) {

// ============================================================
// ROUTE PANEL
// ============================================================
async function openRoute(routeId) {
  activeRouteId = routeId;
  document.querySelectorAll('.route-item').forEach(el => el.classList.toggle('active', el.dataset.id === routeId));

  const route = allRoutes.find(r => r.id === routeId);
  if (!route) return;

  const raw = window._rawData;
  const trips = raw.trips.filter(t => t.route_id === routeId);
  const stops = getOrderedStops(routeId, trips, groupBy(raw.stopTimes, 'trip_id'), groupBy(raw.stops, 'stop_id'));
  const shapeId = routeShapeMap[routeId];
  const coords = shapeId ? (allShapes[shapeId] || []) : [];

  const color = route.color ? `#${route.color}` : '#1A4488';
  const textColor = route.text_color ? `#${route.text_color}` : '#fff';

  // Highlight on map
  if (highlightLayer) map.removeLayer(highlightLayer);
  if (coords.length > 0) {
    highlightLayer = L.polyline(coords, { color, weight: 6, opacity: 1 }).addTo(map);
    map.fitBounds(highlightLayer.getBounds(), { padding: [50,50] });
  }

  const headsigns = route.headsigns || [];
  const headsignHtml = headsigns.length
    ? `<div style="margin-bottom:12px;display:flex;gap:4px;flex-wrap:wrap">${headsigns.map(h =>
      `<span class="kz-badge kz-badge-success">${h}</span>`).join('')}</div>`
    : '';

  const stopsHtml = stops.length
    ? `<ol class="stop-list">${stops.map((s,i) =>
      `<li><span class="stop-num">${i+1}</span><span class="stop-name">${s.stop_name || s.stop_id}</span>` +
      `<small style="color:var(--kz-gris-500)">${s.departure_time || ''}</small>` +
      `<button class="btn-view-stops" onclick="event.stopPropagation();openStopPanel('${s.stop_id}')">⏰ Ver horarios</button></li>`
    ).join('')}</ol>`
    : '<div class="no-data">No hay paradas ordenadas</div>';

  document.getElementById('panel-title').innerHTML =
    `<span class="route-badge" style="background:${color};color:${textColor};width:28px;height:28px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:13px">${route.short_name || '?'}</span> ${route.long_name || route.short_name || 'Ruta ' + route.id}`;

  document.getElementById('panel-body').innerHTML =
    `<div class="kpi-row">
      <div class="kpi-box"><div class="kpi-val">${route.num_trips}</div><div class="kpi-lbl">Viajes</div></div>
      <div class="kpi-box"><div class="kpi-val">${route.num_stops}</div><div class="kpi-lbl">Paradas</div></div>
      <div class="kpi-box"><div class="kpi-val">${route.shape_km || 0} km</div><div class="kpi-lbl">Longitud</div></div>
      <div class="kpi-box"><div class="kpi-val">${headsigns.length}</div><div class="kpi-lbl">Direcciones</div></div>
    </div>
    ${headsignHtml}
    <h4 style="font-size:var(--kz-text-sm);color:var(--kz-azul);margin-bottom:8px">🚏 Paradas ordenadas</h4>
    ${stopsHtml}
    <div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="kz-btn kz-btn-primary kz-btn-sm" onclick="downloadRouteGeoJSON('${routeId}')">🌐 GeoJSON</button>
      <button class="kz-btn kz-btn-secondary kz-btn-sm" onclick="downloadRouteCSV('${routeId}')">📋 CSV Horarios</button>
    </div>`;

  document.getElementById('route-panel').classList.add('open');
  closeStopPanel();
}

let highlightLayer = null;

function closeRoutePanel() {
  document.getElementById('route-panel').classList.remove('open');
  if (highlightLayer) { map.removeLayer(highlightLayer); highlightLayer = null; }
  document.querySelectorAll('.route-item').forEach(el => el.classList.remove('active'));
}

// ============================================================
// STOP PANEL (horarios por parada)
// ============================================================
function openStopPanel(stopId) {
  closeRoutePanel();

  const rbs = window._routesByStop;
  const stopsById = window._stopsById || {};
  const routesById = window._routesById || {};
  const stopTimesByTrip = window._stopTimesByTrip || {};
  const tripsByRoute = window._tripsByRoute || {};
  const raw = window._rawData;

  const stopInfo = stopsById[stopId] || allStops.find(s => s.id === stopId) || {};
  const stopName = stopInfo.stop_name || stopInfo.name || stopId;
  const stopCode = stopInfo.stop_code || '';
  const stopLat = stopInfo.stop_lat || (stopInfo.lat || '');
  const stopLon = stopInfo.stop_lon || (stopInfo.lon || '');

  // Get all routes serving this stop
  const entries = rbs[stopId] || [];

  // Deduplicate by trip_id, keep first occurrence
  const seen = new Set();
  const uniqueEntries = [];
  entries.forEach(e => {
    // Group by (route_id, trip_headsign)
    const key = e.route_id + '|' + e.trip_headsign + '|' + e.departure_time;
    if (!seen.has(key)) {
      seen.add(key);
      uniqueEntries.push(e);
    }
  });

  // Sort by departure_time
  uniqueEntries.sort((a, b) => (a.departure_time || '').localeCompare(b.departure_time || ''));

  // Group by route_id
  const byRoute = {};
  uniqueEntries.forEach(e => {
    if (!byRoute[e.route_id]) byRoute[e.route_id] = [];
    byRoute[e.route_id].push(e);
  });

  // Build HTML
  const routeIds = Object.keys(byRoute).sort();
  let routesHtml = '';

  routeIds.forEach(rid => {
    const r = routesById[rid] || allRoutes.find(x => x.id === rid);
    const color = r ? (r.route_color ? `#${r.route_color}` : '#1A4488') : '#1A4488';
    const shortName = r ? (r.route_short_name || r.route_long_name || rid) : rid;
    const routeName = r ? (r.route_long_name || r.route_short_name || rid) : rid;
    const routeType = r ? (ROUTE_TYPES[r.route_type] || '🚍') : '🚍';
    const times = byRoute[rid];

    // Sort times
    times.sort((a,b) => (a.departure_time||'').localeCompare(b.departure_time||''));

    const rows = times.map(t =>
      `<tr><td>${t.trip_headsign || '—'}</td><td>${t.departure_time || '—'}</td></tr>`
    ).join('');

    routesHtml += `<div class="stop-route-card">
      <div class="sr-header">
        <span class="route-badge" style="background:${color};width:22px;height:22px;font-size:10px">${shortName.substring(0,2)}</span>
        <span>${routeType} ${routeName}</span>
        <span style="margin-left:auto;font-size:var(--kz-text-xs);color:var(--kz-gris-500)">${times.length} salidas</span>
      </div>
      <div class="sr-body">
        <table>
          <thead><tr><th>Dirección</th><th>Salida</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  });

  if (!routesHtml) {
    routesHtml = '<div class="no-data">No hay horarios disponibles para esta parada</div>';
  }

  const coordStr = (stopLat && stopLon) ? `${stopLat}, ${stopLon}` : '';

  document.getElementById('stop-panel-title').innerHTML = `🚏 ${stopName}`;
  document.getElementById('stop-panel-body').innerHTML =
    `<div class="stop-detail-kpi">
      <strong>ID:</strong> ${stopId}${stopCode ? ' · <strong>Código:</strong> '+stopCode : ''}${coordStr ? ' · <strong>Coord:</strong> '+coordStr : ''}
    </div>
    <div style="margin-bottom:12px;display:flex;gap:6px;flex-wrap:wrap">
      <span class="stat-chip">${routeIds.length} rutas</span>
      <span class="stat-chip">${uniqueEntries.length} salidas</span>
      <button class="kz-btn kz-btn-sm kz-btn-ghost" onclick="exportStopCSV('${stopId}')" style="margin-left:auto">📥 CSV</button>
    </div>
    ${routesHtml}`;

  document.getElementById('stop-panel').classList.add('open');
}

function closeStopPanel() {
  document.getElementById('stop-panel').classList.remove('open');
}

function exportStopCSV(stopId) {
  const rbs = window._routesByStop;
  const stopsById = window._stopsById || {};
  const entries = rbs[stopId] || [];
  if (!entries.length) return showToast('⚠️ No hay datos para exportar');

  const stopInfo = stopsById[stopId] || {};
  const stopName = stopInfo.stop_name || stopId;

  // Deduplicate
  const seen = new Set();
  const unique = [];
  entries.forEach(e => {
    const key = e.route_id + '|' + e.trip_headsign + '|' + e.departure_time;
    if (!seen.has(key)) { seen.add(key); unique.push(e); }
  });
  unique.sort((a,b) => (a.departure_time||'').localeCompare(b.departure_time||''));

  const data = unique.map(e => ({
    parada_id: stopId,
    parada_nombre: stopName,
    ruta_id: e.route_id,
    ruta_nombre: e.route_name,
    trip_headsign: e.trip_headsign || '',
    departure_time: e.departure_time || '',
    trip_id: e.trip_id || ''
  }));

  exportTableCSV(data, `horarios_${stopId}`);
}

// ============================================================
// EXPORTS
// ============================================================
function downloadBlob(content, filename, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportTableCSV(data, name) {
  if (!data || !data.length) return showToast('⚠️ No hay datos para exportar');
  const keys = Object.keys(data[0]);
  const csv = '\uFEFF' + keys.join(',') + '\n' +
    data.map(row => keys.map(k => {
      const v = (row[k] || '').toString();
      return v.includes(',') || v.includes('"') ? '"' + v.replace(/"/g,'""') + '"' : v;
    }).join(',')).join('\n');
  downloadBlob(csv, `${name}.csv`, 'text/csv;charset=utf-8');
  showToast(`✅ ${name}.csv descargado`);
}

function downloadRouteGeoJSON(routeId) {
  const route = allRoutes.find(r => r.id === routeId);
  if (!route) return;
  const shapeId = routeShapeMap[routeId];
  const coords = shapeId ? (allShapes[shapeId] || []) : [];
  const raw = window._rawData;
  const trips = raw.trips.filter(t => t.route_id === routeId);
  const stops = getOrderedStops(routeId, trips, groupBy(raw.stopTimes, 'trip_id'), groupBy(raw.stops, 'stop_id'));

  const feature = {
    type: 'Feature',
    geometry: coords.length ? { type: 'LineString', coordinates: coords.map(c => [c[1], c[0]]) } : null,
    properties: {
      route_id: route.id, short_name: route.short_name, long_name: route.long_name,
      route_type: route.type, color: route.color, num_trips: route.num_trips,
      num_stops: route.num_stops, headsigns: route.headsigns, shape_km: route.shape_km,
      stops: stops.map(s => ({ stop_id: s.stop_id, stop_name: s.stop_name }))
    }
  };
  const gj = JSON.stringify(feature, null, 2);
  const name = (route.short_name || route.id).replace(/[^a-zA-Z0-9]/g, '_');
  downloadBlob(gj, `ruta_${name}.geojson`, 'application/geo+json');
  showToast(`✅ ruta_${name}.geojson descargado`);
}

function downloadRouteCSV(routeId) {
  const raw = window._rawData;
  const trips = raw.trips.filter(t => t.route_id === routeId);
  const stopTimes = raw.stopTimes.filter(st => trips.some(t => t.trip_id === st.trip_id));
  const stopsMap = groupBy(raw.stops, 'stop_id');
  const enriched = stopTimes.map(st => ({
    trip_id: st.trip_id,
    stop_id: st.stop_id,
    stop_name: (stopsMap[st.stop_id]||{}).stop_name || '',
    arrival_time: st.arrival_time || '',
    departure_time: st.departure_time || '',
    stop_sequence: st.stop_sequence || '',
    pickup_type: st.pickup_type || '',
    drop_off_type: st.drop_off_type || '',
  }));
  exportTableCSV(enriched, `horarios_${routeId}`);
}

// ============================================================
// UTILS
// ============================================================
function groupBy(arr, key) {
  const map = {};
  (arr || []).forEach(item => { map[item[key]] = item; });
  return map;
}

// ============================================================
// INIT
// ============================================================
initMap();

// Render catalog on load
renderCatalog(OPERADORES);
</script>
